name: Nightly retrieval eval

on:
  schedule:
    # 08:00 UTC = 02:00 CST (winter) / 03:00 CDT (summer).
    # GitHub Actions cron is UTC-only and ignores DST.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  eval:
    name: Run retrieval eval on base model
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      EVAL_WRITE_TO_DB: "1"
      # Answer eval samples 20 items per run, ~40 LLM calls total. Free tier covers it.
      # Set RUN_ANSWER_EVAL=0 in this block to skip (cost / time reduction).
      RUN_ANSWER_EVAL: "1"
      ANSWER_EVAL_SAMPLE: "20"
      EMBEDDING_MODEL_PATH: sentence-transformers/all-MiniLM-L6-v2
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Needed only when RUN_ANSWER_EVAL=1 (RAG chain + judge call out to LLMs)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Optional but recommended: SSURGO / NOAA context caching
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Supabase admin allowlist + JWT secret are unused by eval, but keep the
      # backend modules importable without KeyError if they're referenced.
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            evals/requirements.txt
            backend/requirements.txt

      - name: Install deps (eval + backend for answer-eval RAG chain)
        run: |
          python -m pip install --upgrade pip
          pip install -r evals/requirements.txt
          # Answer eval imports backend.services.rag → needs full backend reqs.
          # Cheap: most overlap with evals/requirements.txt is already cached.
          pip install -r backend/requirements.txt

      - name: Run retrieval + answer eval
        run: |
          python evals/eval_runner.py --eval-set evals/eval_set_v2.jsonl

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: evals/results/eval_*.json
          retention-days: 30
